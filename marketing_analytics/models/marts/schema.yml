version: 2

models:
  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: dim_products
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: dim_campaigns
    columns:
      - name: campaign_id
        tests:
          - not_null
          - unique

  - name: fct_transactions
    columns:
      - name: transaction_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: product_id
        tests:
          - not_null

  - name: fct_customer_metrics
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique


  - name: fct_product_conversion
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: fct_cohort_retention
    columns:
      - name: cohort_month
        tests:
          - not_null

  - name: fct_traffic_conversion
    columns:
      - name: traffic_source
        tests:
          - not_null
      - name: event_type
        tests:
          - not_null

  - name: fct_traffic_monthly
    columns:
      - name: traffic_source
        tests:
          - not_null
      - name: event_month
        tests:
          - not_null

  - name: fct_experiment_groups
    description: "Experiment group performance. Grain: one row per experiment_group. Purchase rate = purchases / views."
    columns:
      - name: experiment_group
        tests:
          - not_null
          - unique
      - name: purchase_rate
        tests:
          - not_null
